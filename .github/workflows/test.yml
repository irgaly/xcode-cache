name: Test

on:
  push:

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
      - run: npm install
      - shell: bash -xeu {0}
        run: npm run build
